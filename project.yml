name: SingReadyAI
options:
  minimumXcodeGenVersion: 2.42.0
  developmentLanguage: zh-Hans
  deploymentTarget:
    iOS: "17.0"
packages:
  SingReadyAISharedKit:
    path: .
targets:
  SingReadyAIApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SingReadyAI/App
      - SingReadyAI/Features
    resources:
      - SingReadyAI/App/PrivacyInfo.xcprivacy
      - PRIVACY.md
    dependencies:
      - package: SingReadyAISharedKit
        product: SingReadyAISharedKit
      - target: SingReadyAIShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huangwei.singreadyai
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 今晚唱什么
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 用于判断大概音域，帮你避开不好唱的歌。不保存录音。
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: 用于把歌单海报保存到相册，方便开唱前发给朋友。
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        CODE_SIGN_ENTITLEMENTS: SingReadyAI/App/SingReadyAI.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7UGQ23VSF7
  SingReadyAIShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SingReadyAI/ShareExtension
    resources:
      - SingReadyAI/ShareExtension/PrivacyInfo.xcprivacy
    info:
      path: SingReadyAI/ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: 今晚唱什么
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    dependencies:
      - package: SingReadyAISharedKit
        product: SingReadyAISharedKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huangwei.singreadyai.shareextension
        TARGETED_DEVICE_FAMILY: 1
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_ENTITLEMENTS: SingReadyAI/ShareExtension/SingReadyAIShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7UGQ23VSF7
  SingReadyAITests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/SingReadyAISharedKitTests
    dependencies:
      - package: SingReadyAISharedKit
        product: SingReadyAISharedKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huangwei.singreadyai.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7UGQ23VSF7
  SingReadyAIUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - UITests/SingReadyAIUITests
    dependencies:
      - target: SingReadyAIApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huangwei.singreadyai.uitests
        TARGETED_DEVICE_FAMILY: 1
        TEST_TARGET_NAME: SingReadyAIApp
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7UGQ23VSF7
schemes:
  SingReadyAIApp:
    build:
      targets:
        SingReadyAIApp: all
    test:
      targets:
        - SingReadyAITests
        - SingReadyAIUITests
