name: SingReadyAI
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
packages:
  SingReadyAISharedKit:
    path: .
targets:
  SingReadyAIApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SingReadyAI/App
      - SingReadyAI/Features
    dependencies:
      - package: SingReadyAISharedKit
        product: SingReadyAISharedKit
      - target: SingReadyAIShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SingReadyAI
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 今晚唱什么
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 用于分析你的声线区间，以推荐更适合 KTV 演唱的歌曲。
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        CODE_SIGN_ENTITLEMENTS: SingReadyAI/App/SingReadyAI.entitlements
        DEVELOPMENT_TEAM: ""
  SingReadyAIShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SingReadyAI/ShareExtension
    info:
      path: SingReadyAI/ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: 今晚唱什么
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    dependencies:
      - package: SingReadyAISharedKit
        product: SingReadyAISharedKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SingReadyAI.ShareExtension
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_ENTITLEMENTS: SingReadyAI/ShareExtension/SingReadyAIShareExtension.entitlements
        DEVELOPMENT_TEAM: ""
  SingReadyAITests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/SingReadyAISharedKitTests
    dependencies:
      - package: SingReadyAISharedKit
        product: SingReadyAISharedKit
  SingReadyAIUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - UITests/SingReadyAIUITests
    dependencies:
      - target: SingReadyAIApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SingReadyAI.UITests
        TEST_TARGET_NAME: SingReadyAIApp
        GENERATE_INFOPLIST_FILE: YES
